<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: #F7F9FC; color: #111827; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  input:focus, textarea:focus, select:focus { border-color: #0B1F3A !important; box-shadow: 0 0 0 3px rgba(11,31,58,0.1); }
  input:hover, textarea:hover { border-color: #A0AEC0 !important; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }

  /* Chat overlay */
  #chatOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(11,31,58,0.65);
    backdrop-filter: blur(4px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #chatOverlay.open { display: flex; }

  /* Mobile nav */
  @media (max-width: 768px) {
    .desktop-nav { display: none !important; }
    .mobile-menu-btn { display: block !important; }
    section, .page-section { padding-left: 20px !important; padding-right: 20px !important; }
    [style*="grid-template-columns: repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
    [style*="grid-template-columns: repeat(3"] { grid-template-columns: repeat(1, 1fr) !important; }
    [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns: 2fr 1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
    [style*="grid-template-columns: 1fr 360px"] { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns: 2.2fr 1.5fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
    [style*="grid-template-columns: repeat(3, 1fr)"] { grid-template-columns: 1fr !important; }
    [style*="grid-template-columns: 2fr 1fr 1fr"] { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 480px) {
    [style*="grid-template-columns: repeat(2"] { grid-template-columns: 1fr !important; }
    [style*="font-size: clamp"] { font-size: 32px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Load components in order -->
<script type="text/babel" src="acs-components.jsx"></script>
<script type="text/babel" src="acs-services.jsx"></script>
<script type="text/babel" src="acs-pages.jsx"></script>

<!-- Compatibility shim: route window.claude.complete to Netlify function -->
<script>
  (function () {
    function extractUserMessage(payload) {
      try {
        var first = payload && payload.messages && payload.messages[0];
        var text = (first && first.content) ? String(first.content) : "";
        var m = text.match(/User:\s*([\s\S]*)$/i);
        return (m ? m[1] : text).trim() || "Hi";
      } catch (_) {
        return "Hi";
      }
    }

    async function callChat(message) {
      var transcriptEl = document.getElementById("assistantText");
      var transcript = transcriptEl ? (transcriptEl.dataset.transcript || transcriptEl.textContent || "") : "";
      if (transcript.length > 1400) transcript = transcript.slice(transcript.length - 1400);
      var body = {
        message: message,
        chatSessionId: "web_" + Date.now(),
        knownIntake: {},
        intakeAlreadySubmitted: false,
        chatTranscript: transcript
      };
      var r = await fetch("/.netlify/functions/website-chat-handoff", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      var data = {};
      try { data = await r.json(); } catch (_) {}
      if (!r.ok || !data.ok) {
        throw new Error((data && data.error) || "AI request failed");
      }
      return data.reply || "Thanks! How can I help further?";
    }

    window.claude = window.claude || {};
    window.claude.complete = async function (payload) {
      var message = extractUserMessage(payload);
      return callChat(message);
    };
  })();
</script>

<!-- Main App -->
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── AI Chat Overlay ──────────────────────────────────────────
function ChatOverlay({ open, onClose }) {
  const [messages, setMessages] = useState([
    { role: 'assistant', text: "Hi! I'm the All Clean Solutions AI assistant. I can help with services, scheduling, pricing, or service areas in Bismarck/Mandan. If you request a quote, All Clean Solutions may contact you about that request by phone or email. SMS texts are only sent if you separately opt in on the quote form. How can I help?" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const transcriptRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (open && inputRef.current) setTimeout(() => inputRef.current.focus(), 100);
  }, [open]);

  useEffect(() => {
    if (transcriptRef.current) {
      transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
    }
  }, [messages, loading]);

  const sendMessage = useCallback(async () => {
    const text = input.trim();
    if (!text || loading) return;
    setInput('');
    const newMessages = [...messages, { role: 'user', text }];
    setMessages(newMessages);
    setLoading(true);

    try {
      const history = newMessages.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text }));
      const systemMsg = `You are the AI assistant for All Clean Solutions, a professional cleaning company based in Bismarck, ND. Services: Hood & Exhaust Cleaning, Carpet Cleaning, Window Cleaning, Pressure Washing, Snow Removal & Ice Management, Lawn Care & Grounds, Commercial Cleaning, Deep Cleaning, and Degreasing. Service area: Bismarck/Mandan and surrounding communities. Phone: (701) 587-1158. Email: info@acsbismarck.com. Free estimates available. Be helpful, professional, and concise. If asked to schedule or request a quote, direct them to fill out the quote form or call. Tell customers that submitting a quote request lets All Clean Solutions contact them about that request by phone or email, and SMS text messages are only sent if they separately opt in on the quote form. Do not say they will receive SMS without consent.`;

      const reply = await window.claude.complete({
        messages: [{ role: 'user', content: `[SYSTEM: ${systemMsg}]\n\nUser: ${text}` }]
      });
      setMessages(prev => [...prev, { role: 'assistant', text: reply }]);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'assistant', text: "I'm having trouble connecting right now. Please call us at (701) 587-1158 or fill out our quote form and we'll get back to you within 1 hour." }]);
    }
    setLoading(false);
  }, [input, messages, loading]);

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  // Build the transcript text for the required ID
  const transcriptText = messages.map(m => `${m.role === 'assistant' ? 'Assistant' : 'You'}: ${m.text}`).join('\n\n');

  return (
    <div id="chatOverlay" className={open ? 'open' : ''} onClick={e => { if (e.target.id === 'chatOverlay') onClose(); }}>
      <div style={{
        background: '#fff', borderRadius: 20, width: '100%', maxWidth: 560,
        maxHeight: '85vh', display: 'flex', flexDirection: 'column',
        boxShadow: '0 24px 80px rgba(0,0,0,0.35)', overflow: 'hidden'
      }}>
        {/* Header */}
        <div style={{ background: C.navy, padding: '20px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 40, height: 40, background: C.pink, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="bot" size={20} color="#fff" sw={1.8}/>
            </div>
            <div>
              <div style={{ fontFamily: 'Plus Jakarta Sans, sans-serif', fontSize: 16, fontWeight: 800, color: '#fff' }}>AI Assistant</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginTop: 2 }}>
                <div style={{ width: 7, height: 7, borderRadius: '50%', background: '#4ade80' }}></div>
                <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.55)' }}>All Clean Solutions · Online</span>
              </div>
            </div>
          </div>
          <button id="chatCloseButton" onClick={onClose} style={{ background: 'rgba(255,255,255,0.1)', border: 'none', borderRadius: 8, width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
            <Icon name="x" size={16} color="rgba(255,255,255,0.7)" sw={2.5}/>
          </button>
        </div>

        {/* Transcript */}
        <div
          id="assistantText"
          ref={transcriptRef}
          data-transcript={transcriptText}
          style={{ flex: 1, overflowY: 'auto', padding: '20px 20px 12px', display: 'flex', flexDirection: 'column', gap: 12, minHeight: 300 }}
        >
          {messages.map((msg, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start' }}>
              {msg.role === 'assistant' && (
                <div style={{ width: 28, height: 28, background: C.navyLight, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', marginRight: 8, marginTop: 2, flexShrink: 0 }}>
                  <Icon name="bot" size={14} color={C.navy} sw={1.8}/>
                </div>
              )}
              <div style={{
                maxWidth: '75%', padding: '10px 14px', borderRadius: msg.role === 'user' ? '16px 16px 4px 16px' : '16px 16px 16px 4px',
                background: msg.role === 'user' ? C.pink : C.surface,
                color: msg.role === 'user' ? '#fff' : C.charcoal,
                fontSize: 14, lineHeight: 1.65, border: msg.role === 'assistant' ? `1px solid ${C.border}` : 'none'
              }}>
                {msg.text}
              </div>
            </div>
          ))}
          {loading && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ width: 28, height: 28, background: C.navyLight, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Icon name="bot" size={14} color={C.navy} sw={1.8}/>
              </div>
              <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: '16px 16px 16px 4px', padding: '10px 16px', display: 'flex', gap: 5 }}>
                {[0, 1, 2].map(j => (
                  <div key={j} style={{ width: 7, height: 7, borderRadius: '50%', background: C.silver, animation: `bounce 1.2s ease-in-out ${j * 0.2}s infinite` }}></div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Quick prompts */}
        {messages.length === 1 && (
          <div style={{ padding: '0 20px 12px', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {['Hood cleaning pricing', 'Service areas', 'Schedule a service', 'Snow removal contracts'].map(q => (
              <button key={q} onClick={() => { setInput(q); setTimeout(() => sendMessage, 50); setMessages(prev => [...prev, { role: 'user', text: q }]); setInput(''); setLoading(true);
                window.claude.complete({ messages: [{ role: 'user', content: `[SYSTEM: You are the AI assistant for All Clean Solutions, a commercial cleaning company in Bismarck/Mandan, ND. Be brief and helpful. If the customer asks to schedule or get a quote, tell them quote submission allows ACS to contact them about the request by phone or email, and SMS texts require separate opt-in on the quote form.]\n\nUser: ${q}` }] })
                  .then(r => { setMessages(prev => [...prev, { role: 'assistant', text: r }]); setLoading(false); })
                  .catch(() => { setMessages(prev => [...prev, { role: 'assistant', text: 'Sorry, try again or call (701) 587-1158.' }]); setLoading(false); });
              }} style={{ fontSize: 12, fontWeight: 500, color: C.navy, background: C.navyLight, border: `1px solid rgba(11,31,58,0.15)`, borderRadius: 20, padding: '5px 12px', cursor: 'pointer', fontFamily: 'Inter, sans-serif' }}>
                {q}
              </button>
            ))}
          </div>
        )}

        {/* Input row */}
        <div style={{ padding: '12px 16px 16px', borderTop: `1px solid ${C.border}`, display: 'flex', gap: 10, alignItems: 'flex-end', flexShrink: 0 }}>
          <textarea
            id="userInput"
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Ask a question about our services..."
            rows={1}
            style={{ flex: 1, fontFamily: 'Inter, sans-serif', fontSize: 14, border: `1.5px solid ${C.border}`, borderRadius: 10, padding: '10px 14px', resize: 'none', outline: 'none', lineHeight: 1.5, color: C.charcoal, background: C.surface, maxHeight: 100, overflowY: 'auto' }}
          />
          <button
            id="sendButton"
            onClick={sendMessage}
            disabled={loading || !input.trim()}
            style={{ width: 42, height: 42, borderRadius: 10, background: input.trim() && !loading ? C.pink : C.border, border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: input.trim() && !loading ? 'pointer' : 'default', transition: 'background 150ms', flexShrink: 0 }}
          >
            <Icon name="send" size={16} color={input.trim() && !loading ? '#fff' : C.muted} sw={2}/>
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [chatOpen, setChatOpen] = useState(false);
  const scrollRef = useRef(null);

  const navigate = useCallback((p) => {
    setPage(p);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
    else window.scrollTo(0, 0);
  }, []);

  const renderPage = () => {
    if (page === 'home')             return <HomePage onNav={navigate}/>;
    if (page === 'services')         return <ServicesHubPage onNav={navigate}/>;
    if (page === 'about')            return <AboutPage onNav={navigate}/>;
    if (page === 'blog')             return <BlogPage onNav={navigate}/>;
    if (page === 'areas')            return <ServiceAreasPage onNav={navigate}/>;
    if (page === 'gallery')          return <GalleryPage onNav={navigate}/>;
    if (page === 'contact')          return <ContactPage onNav={navigate}/>;
    if (page === 'privacy')          return <PrivacyPage onNav={navigate}/>;
    if (page === 'terms')            return <TermsPage onNav={navigate}/>;
    if (SERVICE_DATA[page])          return <ServiceDetailPage serviceKey={page} onNav={navigate}/>;
    return <HomePage onNav={navigate}/>;
  };

  return (
    <>
      <style>{`
        @keyframes bounce {
          0%, 60%, 100% { transform: translateY(0); }
          30% { transform: translateY(-6px); }
        }
        button:active { transform: scale(0.97); }
      `}</style>
      <div ref={scrollRef} style={{ minHeight: '100vh', overflowY: 'auto', overflowX: 'hidden' }}>
        <SiteNav page={page} onNav={navigate} onChatOpen={() => setChatOpen(true)}/>
        <main>{renderPage()}</main>
      </div>
      <ChatOverlay open={chatOpen} onClose={() => setChatOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">

    <circle cx="60" cy="40" r="12" fill="#8B1E5A"/>
    <polyline points="55,40 59,44 66,36" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <text x="60" y="72" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" text-anchor="middle">All Clean Solutions</text>
  </svg>
</template>
</body>
